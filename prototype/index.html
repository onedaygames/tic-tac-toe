<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A lovingly hand-crafted Tic-Tac-Toe game by One Day Games. Birds, squirrels, acorns, sunshine — and a sneaky CPU opponent." />
  <meta name="theme-color" content="#5bc8f5" />
  <title>Tic-Tac-Toe — One Day Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- One Day Games Analytics -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="2fbe577a-0292-40ad-a6e9-1936d5774f0c"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: clamp(10px, 8vh, 18vh);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;

      /* Sky gradient background */
      background:
        radial-gradient(ellipse at 20% 15%, rgba(255,255,255,0.55) 0%, transparent 35%),
        radial-gradient(ellipse at 75% 10%, rgba(255,255,255,0.45) 0%, transparent 30%),
        linear-gradient(to bottom, #5bc8f5 0%, #93dcf8 45%, #c2f0a0 80%, #7ec850 100%);
    }

    /* Floating clouds */
    .cloud {
      position: fixed;
      border-radius: 50px;
      background: rgba(255,255,255,0.82);
      filter: blur(1.5px);
      pointer-events: none;
      z-index: 0;
    }
    .cloud-1 {
      width: 180px; height: 52px;
      top: 8%;
      box-shadow: 60px -12px 0 20px rgba(255,255,255,0.65),
                  -40px 8px 0 12px rgba(255,255,255,0.55);
      animation: floatCloud1 28s linear infinite;
    }
    .cloud-2 {
      width: 130px; height: 38px;
      top: 16%;
      box-shadow: 50px -8px 0 15px rgba(255,255,255,0.65),
                  -28px 6px 0 8px rgba(255,255,255,0.55);
      animation: floatCloud2 38s linear infinite;
    }
    .cloud-3 {
      width: 100px; height: 30px;
      top: 6%;
      box-shadow: 38px -8px 0 12px rgba(255,255,255,0.6),
                  -20px 5px 0 6px rgba(255,255,255,0.5);
      animation: floatCloud3 50s linear infinite;
    }

    @keyframes floatCloud1 {
      0%   { left: -260px; }
      100% { left: 110%; }
    }
    @keyframes floatCloud2 {
      0%   { left: 110%; }
      100% { left: -210px; }
    }
    @keyframes floatCloud3 {
      0%   { left: 30%; }
      100% { left: 110%; }
    }

    /* Sun — 3× bigger */
    .sun {
      position: fixed;
      top: -30px; right: 30px;
      width: 192px; height: 192px;
      background: radial-gradient(circle at 38% 36%, #fffde0, #FFE03A 52%, #ffb800);
      border-radius: 50%;
      box-shadow: 0 0 0 28px rgba(255,224,58,0.22),
                  0 0 0 56px rgba(255,224,58,0.10),
                  0 0 80px 20px rgba(255,200,0,0.18);
      pointer-events: none;
      animation: sunPulse 2.4s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes sunPulse {
      0%   { transform: scale(1);    box-shadow: 0 0 0 24px rgba(255,224,58,0.24), 0 0 0 52px rgba(255,224,58,0.10), 0 0 70px 16px rgba(255,200,0,0.15); }
      40%  { transform: scale(1.07); box-shadow: 0 0 0 38px rgba(255,224,58,0.18), 0 0 0 72px rgba(255,224,58,0.07), 0 0 100px 28px rgba(255,200,0,0.12); }
      70%  { transform: scale(1.04); box-shadow: 0 0 0 30px rgba(255,224,58,0.20), 0 0 0 60px rgba(255,224,58,0.09), 0 0 80px 20px rgba(255,200,0,0.14); }
      100% { transform: scale(1);    box-shadow: 0 0 0 24px rgba(255,224,58,0.24), 0 0 0 52px rgba(255,224,58,0.10), 0 0 70px 16px rgba(255,200,0,0.15); }
    }

    .container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(5px, 1.4vh, 12px);
      z-index: 2;
    }

    /* Title */
    .title-wrap {
      position: relative;
      display: inline-block;
      overflow: hidden;
      border-radius: 12px;
      padding: 0 8px;
    }
    /* Title glint — light travels through the actual letter fills */
    @keyframes titleGlint {
      0%, 18%  { background-position: 110% 0; }
      52%      { background-position: -14% 0; }
      100%     { background-position: -14% 0; }
    }
    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(3rem, 11vh, 7.5rem);
      line-height: 1;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg,
        #f97316  0%, #f97316  9%,
        #3b82f6 24%, #22c55e 40%,
        #fef9e7 47%, #fffef8 51%, #fef9e7 55%,
        #22c55e 63%, #3b82f6 77%,
        #f97316 91%, #f97316 100%
      );
      background-size: 280% 100%;
      background-position: 110% 0;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(3px 4px 0px rgba(0,0,0,0.20));
      animation: titleGlint 8s ease-in-out 1.5s infinite;
    }

    /* Score bar */
    .scores {
      display: flex;
      gap: 16px;
    }

    .score-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: rgba(255,255,255,0.65);
      border-radius: 16px;
      padding: clamp(4px, 1vh, 8px) clamp(12px, 2vw, 22px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.10), 0 1px 0 rgba(255,255,255,0.8) inset;
      backdrop-filter: blur(4px);
    }

    .score-label {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .score-label.x { color: #2563eb; }
    .score-label.o { color: #dc2626; }
    .score-label.d { color: #6b7280; }

    .score-value {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.1rem, 3.5vh, 1.8rem);
      line-height: 1;
      color: #1e293b;
    }

    /* Status pill */
    .status {
      font-size: 1rem;
      font-weight: 800;
      padding: 6px 22px;
      border-radius: 50px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      color: #374151;
      transition: background 0.3s, color 0.3s;
      min-width: 180px;
      text-align: center;
    }
    .status.win-x { background: #dbeafe; color: #1d4ed8; }
    .status.win-o { background: #fee2e2; color: #b91c1c; }
    .status.draw  { background: #f3f4f6; color: #6b7280; }

    /* Lovingly hand-crafted wooden board */
    .board-wrap {
      position: relative;
      background:
        repeating-linear-gradient(
          102deg, transparent, transparent 26px,
          rgba(90,42,8,0.08) 26px, rgba(90,42,8,0.08) 27px,
          transparent 27px, transparent 53px,
          rgba(110,52,10,0.05) 53px, rgba(110,52,10,0.05) 54px
        ),
        repeating-linear-gradient(
          97deg, transparent, transparent 40px,
          rgba(70,30,5,0.04) 40px, rgba(70,30,5,0.04) 41px
        ),
        linear-gradient(156deg,
          #da9242 0%, #c17a28 16%, #b06a1e 32%,
          #c88030 46%, #a85e18 59%, #be7828 73%, #cc8838 88%, #c07028 100%
        );
      border-radius: 26px;
      padding: clamp(9px, 2vh, 16px);
      box-shadow:
        0 10px 0 #7a3e0a,
        0 15px 36px rgba(0,0,0,0.44),
        0 3px 0 rgba(255,215,130,0.38) inset,
        0 -2px 0 rgba(50,20,2,0.28) inset;
      border: 2.5px solid #8a4c12;
      outline: 1.5px solid rgba(255,195,80,0.18);
      outline-offset: -4px;
    }

    /* Board attract-mode glow pulse */
    .board-wrap.attract {
      animation: boardGlow 1.05s ease-in-out infinite;
    }
    @keyframes boardGlow {
      0%,100% { box-shadow: 0 10px 0 #7a3e0a, 0 15px 36px rgba(0,0,0,0.44), 0 3px 0 rgba(255,215,130,0.38) inset, 0 -2px 0 rgba(50,20,2,0.28) inset; }
      50%     { box-shadow: 0 10px 0 #7a3e0a, 0 15px 36px rgba(0,0,0,0.44), 0 3px 0 rgba(255,215,130,0.38) inset, 0 -2px 0 rgba(50,20,2,0.28) inset, 0 0 0 7px rgba(253,224,71,0.42), 0 0 44px 12px rgba(253,224,71,0.22); }
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(7px, 1.5vh, 11px);
    }

    /* Hand-sanded wooden cell */
    .cell {
      width: clamp(70px, 14vh, 108px);
      height: clamp(70px, 14vh, 108px);
      background:
        repeating-linear-gradient(
          91deg, transparent, transparent 11px,
          rgba(140,80,15,0.09) 11px, rgba(140,80,15,0.09) 12px,
          transparent 12px, transparent 24px,
          rgba(110,60,10,0.06) 24px, rgba(110,60,10,0.06) 25px
        ),
        linear-gradient(148deg,
          #f3da9a 0%, #ecc870 26%, #d8ae50 50%, #e5bc68 72%, #f1cd80 100%
        );
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s, filter 0.15s;
      box-shadow:
        0 3px 0 #a87220,
        0 1px 0 rgba(255,245,190,0.65) inset,
        0 -1px 0 rgba(100,50,5,0.12) inset;
      position: relative;
      overflow: hidden;
    }

    /* Wood knot / grain curl on each cell */
    .cell::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 38% at 28% 62%, rgba(120,60,10,0.07) 0%, transparent 70%),
        repeating-linear-gradient(
          88deg, transparent, transparent 14px,
          rgba(150,85,18,0.07) 14px, rgba(150,85,18,0.07) 15px
        );
      border-radius: inherit;
      pointer-events: none;
    }

    .cell:hover:not(.taken) {
      transform: translateY(-2px) scale(1.04);
      filter: brightness(1.06);
    }
    .cell.taken { cursor: default; }

    /* SVG marks — bigger and bolder */
    .cell svg { width: clamp(44px, 9vh, 68px); height: clamp(44px, 9vh, 68px); position: relative; z-index: 1; }

    /* X — bold blue with white outline effect */
    .mark-x line {
      stroke: #2563eb;
      stroke-width: 9;
      stroke-linecap: round;
      filter: drop-shadow(0 2px 0px rgba(0,0,0,0.20));
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: draw 0.22s ease forwards;
    }
    .mark-x line:nth-child(2) { animation-delay: 0.07s; }

    /* O — bold red */
    .mark-o circle {
      fill: none;
      stroke: #dc2626;
      stroke-width: 9;
      stroke-linecap: round;
      filter: drop-shadow(0 2px 0px rgba(0,0,0,0.20));
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw 0.28s ease forwards;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    /* Winning highlight */
    .cell.winner {
      background: linear-gradient(145deg, #fef9c3, #fde047);
      box-shadow: 0 0 0 3px #facc15, 0 3px 0 #b8922a;
      animation: pulse 0.45s ease 0.25s both;
    }
    .cell.winner .mark-x line { stroke: #1d4ed8; }
    .cell.winner .mark-o circle { stroke: #b91c1c; }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.09); }
      100% { transform: scale(1); }
    }

    /* Sun rays */
    .rays {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: conic-gradient(
        from 148deg at 96% -2%,
        rgba(255,245,100,0.28) 0deg,   transparent 9deg,
        rgba(255,245,100,0.20) 18deg,  transparent 27deg,
        rgba(255,245,100,0.25) 36deg,  transparent 45deg,
        rgba(255,245,100,0.18) 54deg,  transparent 63deg,
        rgba(255,245,100,0.22) 72deg,  transparent 81deg,
        rgba(255,245,100,0.15) 90deg,  transparent 99deg,
        rgba(255,245,100,0.20) 108deg, transparent 117deg,
        rgba(255,245,100,0.14) 126deg, transparent 135deg,
        rgba(255,245,100,0.18) 144deg, transparent 360deg
      );
    }

    /* Scenery layer */
    .scenery {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 54vh;
      min-height: 340px;
      pointer-events: none;
      z-index: 0;
    }
    .scenery svg { width: 100%; height: 100%; }

    /* Board overlay — attract / "click to play" screen */
    .board-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      background: rgba(26,10,2,0.50);
      backdrop-filter: blur(3px);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
      z-index: 10;
    }
    .board-overlay.visible { opacity: 1; pointer-events: auto; }
    .play-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      animation: playPulse 0.92s ease-in-out infinite;
      user-select: none;
    }
    .play-arrow {
      font-size: 2.4rem;
      color: #fde047;
      text-shadow: 0 0 20px rgba(255,215,0,0.95), 0 0 50px rgba(255,215,0,0.5);
      line-height: 1;
    }
    .play-label {
      font-family: 'Fredoka One', cursive;
      font-size: 3.6rem;
      color: #fff;
      letter-spacing: 0.06em;
      text-shadow: 0 3px 14px rgba(0,0,0,0.55), 0 0 36px rgba(255,230,80,0.55);
    }
    @keyframes playPulse {
      0%,100% { transform: scale(1);    filter: brightness(1);    }
      50%     { transform: scale(1.15); filter: brightness(1.22); }
    }

    /* Sun win-burst rings */
    .sun-ring {
      position: fixed;
      top: -30px; right: 30px;
      width: 192px; height: 192px;
      border-radius: 50%;
      border: 5px solid rgba(255,230,40,0.85);
      pointer-events: none;
      z-index: 3;
      animation: sunRingExpand 1.5s ease-out forwards;
    }
    @keyframes sunRingExpand {
      0%   { transform: scale(1.05); opacity: 1;   }
      100% { transform: scale(5.5);  opacity: 0;   }
    }

    /* Title win burst */
    @keyframes titleWinBurst {
      0%   { transform: scale(1)    rotate(0deg);  }
      18%  { transform: scale(1.42) rotate(-4deg); filter: drop-shadow(0 0 28px rgba(255,220,40,0.95)); }
      36%  { transform: scale(1.28) rotate(3deg);  filter: drop-shadow(0 0 18px rgba(255,200,30,0.8)); }
      54%  { transform: scale(1.14) rotate(-1.5deg); }
      72%  { transform: scale(1.06) rotate(1deg);  }
      100% { transform: scale(1)    rotate(0deg);  }
    }
    .title-wrap.bursting { animation: titleWinBurst 1.1s cubic-bezier(.36,.07,.19,.97) forwards; }

    /* Tree & flower wind sway */
    @keyframes treeSway   { 0% { transform: rotate(-1.3deg); } 100% { transform: rotate(1.6deg); } }
    @keyframes flowerSway { 0% { transform: rotate(-5deg);   } 100% { transform: rotate(6deg);   } }
    .ts { transform-box: fill-box; transform-origin: bottom center; }
    .fs { transform-box: fill-box; transform-origin: 50% 100%; }

    /* Ensure the viewport never scrolls in any embed context */
    html { height: 100%; overflow: hidden; }

    /* === Bird House === */
    @keyframes smokeFloat {
      0%   { transform: translateY(0px) scale(0.7); opacity: 0.55; }
      100% { transform: translateY(-22px) scale(2);  opacity: 0;    }
    }
    @keyframes wingWave {
      0%, 32%, 100% { transform: rotate(0deg);  }
      10%           { transform: rotate(-58deg); }
      22%           { transform: rotate(-8deg);  }
    }
    @keyframes birdBob {
      0%, 100% { transform: translateY(0px);  }
      50%      { transform: translateY(-2px); }
    }
    @keyframes birdPeek {
      0%, 18%, 74%, 100% { transform: translateY(0px);  }
      32%, 62%           { transform: translateY(15px); }
    }
    .smoke-a { transform-box: fill-box; transform-origin: 50% 100%; animation: smokeFloat 3.4s ease-out 0s   infinite; }
    .smoke-b { transform-box: fill-box; transform-origin: 50% 100%; animation: smokeFloat 3.4s ease-out 1.7s infinite; }
    .wl   { transform-box: fill-box; transform-origin: 100% 50%; animation: wingWave 5.0s ease-in-out 0.4s infinite; }
    .wr   { transform-box: fill-box; transform-origin: 0%   50%; animation: wingWave 6.8s ease-in-out 3.1s infinite; }
    .bbird { transform-box: fill-box; transform-origin: 50% 50%;  animation: birdBob  2.4s ease-in-out         infinite; }
    .bpeek { transform-box: fill-box; transform-origin: 50% 100%; animation: birdPeek 9.5s ease-in-out 2.1s   infinite; }
  /* === Lose/Draw Reaction Animation === */

/* Sun dim overlay for lose/draw */
.sun.sad {
  animation: sunSad 3.2s ease-in-out forwards !important;
}
@keyframes sunSad {
  0%   { filter: brightness(1)   saturate(1);   }
  35%  { filter: brightness(0.55) saturate(0.4); }
  70%  { filter: brightness(0.60) saturate(0.45); }
  100% { filter: brightness(1)   saturate(1);   }
}

/* Cloud frown drift â clouds drift toward center */
.cloud.sad-drift-left {
  animation: cloudSadLeft 3.0s ease-in-out forwards !important;
}
.cloud.sad-drift-right {
  animation: cloudSadRight 3.0s ease-in-out forwards !important;
}
@keyframes cloudSadLeft {
  0%   { transform: translateX(0px)   translateY(0px); filter: blur(1.5px) brightness(1);   }
  40%  { transform: translateX(60px)  translateY(18px); filter: blur(2px)  brightness(0.78); }
  75%  { transform: translateX(50px)  translateY(15px); filter: blur(2px)  brightness(0.80); }
  100% { transform: translateX(0px)   translateY(0px); filter: blur(1.5px) brightness(1);   }
}
@keyframes cloudSadRight {
  0%   { transform: translateX(0px)   translateY(0px); filter: blur(1.5px) brightness(1);   }
  40%  { transform: translateX(-60px) translateY(18px); filter: blur(2px)  brightness(0.78); }
  75%  { transform: translateX(-50px) translateY(15px); filter: blur(2px)  brightness(0.80); }
  100% { transform: translateX(0px)   translateY(0px); filter: blur(1.5px) brightness(1);   }
}

/* Title sad droop */
@keyframes titleSadDroop {
  0%   { transform: scale(1)    rotate(0deg)   translateY(0px);  }
  25%  { transform: scale(0.94) rotate(-2.5deg) translateY(6px); filter: drop-shadow(3px 4px 0px rgba(0,0,0,0.20)); }
  55%  { transform: scale(0.96) rotate(-1.5deg) translateY(4px); }
  80%  { transform: scale(0.99) rotate(-0.5deg) translateY(1px); }
  100% { transform: scale(1)    rotate(0deg)   translateY(0px);  }
}
.title-wrap.sad-drooping {
  animation: titleSadDroop 2.8s cubic-bezier(.36,.07,.19,.97) forwards;
}

/* Scenery sad dim */
.scenery.sad-dim {
  animation: scenerySadDim 3.2s ease-in-out forwards;
}
@keyframes scenerySadDim {
  0%   { filter: brightness(1)    saturate(1);   }
  38%  { filter: brightness(0.72) saturate(0.55); }
  70%  { filter: brightness(0.75) saturate(0.60); }
  100% { filter: brightness(1)    saturate(1);   }
}

/* Rays dim */
.rays.sad-dim {
  animation: raysSadDim 3.2s ease-in-out forwards;
}
@keyframes raysSadDim {
  0%   { opacity: 1;    }
  38%  { opacity: 0.18; }
  70%  { opacity: 0.22; }
  100% { opacity: 1;    }
}

/* Board sad shake */
@keyframes boardSadShake {
  0%   { transform: translateX(0px)  translateY(0px); }
  12%  { transform: translateX(-5px) translateY(2px); }
  25%  { transform: translateX(4px)  translateY(-1px); }
  38%  { transform: translateX(-3px) translateY(1px); }
  50%  { transform: translateX(2px)  translateY(0px); }
  65%  { transform: translateX(-1px) translateY(0px); }
  100% { transform: translateX(0px)  translateY(0px); }
}
.board-wrap.sad-shake {
  animation: boardSadShake 0.55s ease-out forwards;
}
</style>
</head>
<body>
<div class="sun"></div>
<div class="rays"></div>
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<div class="scenery">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 360" preserveAspectRatio="xMidYMax meet">
  <defs>
    <linearGradient id="hfar" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a8c35"/><stop offset="100%" stop-color="#3d7828"/></linearGradient>
    <linearGradient id="hmid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#58aa40"/><stop offset="100%" stop-color="#46922e"/></linearGradient>
    <linearGradient id="hnear" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6acc4e"/><stop offset="100%" stop-color="#56b03a"/></linearGradient>
    <linearGradient id="hfore" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#80e264"/><stop offset="100%" stop-color="#68c84e"/></linearGradient>
  </defs>

  <!-- Far hills -->
  <path d="M-10,118 C80,82 200,104 360,90 C520,76 660,96 820,84 C980,72 1120,90 1280,78 C1380,70 1430,82 1450,78 L1450,360 L-10,360 Z" fill="url(#hfar)"/>

    <ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#fde047"/><ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#fde047" transform="rotate(45)"/><ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#fde047" transform="rotate(90)"/><ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#fde047" transform="rotate(135)"/><ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#fde047" transform="rotate(180)"/><ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#fde047" transform="rotate(225)"/><ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#fde047" transform="rotate(270)"/><ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#fde047" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="6" fill="#92400e"/></g>
  <!-- Pink 3 -->
  <g class="fs" style="animation:flowerSway 2.1s ease-in-out 1.1s infinite alternate-reverse" transform="translate(1410,279) scale(0.95)"><line x1="0" y1="2" x2="0" y2="16" stroke="#4a8020" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0" cy="-6" rx="4" ry="7" fill="#f472b6"/><ellipse cx="0" cy="-6" rx="4" ry="7" fill="#f472b6" transform="rotate(60)"/><ellipse cx="0" cy="-6" rx="4" ry="7" fill="#f472b6" transform="rotate(120)"/><ellipse cx="0" cy="-6" rx="4" ry="7" fill="#f472b6" transform="rotate(180)"/><ellipse cx="0" cy="-6" rx="4" ry="7" fill="#f472b6" transform="rotate(240)"/><ellipse cx="0" cy="-6" rx="4" ry="7" fill="#f472b6" transform="rotate(300)"/>

</svg>

<div class="container">
  <div class="title-wrap"><h1>tic-tac-toe</h1></div>

  <div class="scores">
    <div class="score-box">
      <span class="score-label x">You (X)</span>
      <span class="score-value" id="score-x">0</span>
    </div>
    <div class="score-box">
      <span class="score-label d">Draw</span>
      <span class="score-value" id="score-d">0</span>
    </div>
    <div class="score-box">
      <span class="score-label o">CPU (O)</span>
      <span class="score-value" id="score-o">0</span>
    </div>
  </div>

  <div class="status" id="status">Your turn</div>

  <div class="board-wrap" id="board-wrap">
    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>
    <div class="board-overlay" id="board-overlay">
      <div class="play-prompt">
        <div class="play-arrow">▶</div>
        <div class="play-label">Play!</div>
      </div>
    </div>
  </div>
</div>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board, current, gameOver, scores = { X: 0, O: 0, D: 0 };
  let cpuThinking = false;

  const cells        = [...document.querySelectorAll('.cell')];
  const statusEl     = document.getElementById('status');
  const scoreX       = document.getElementById('score-x');
  const scoreO       = document.getElementById('score-o');
  const scoreD       = document.getElementById('score-d');
  const boardOverlay = document.getElementById('board-overlay');
  const boardWrap    = document.getElementById('board-wrap');

  let _attractBurstTimer = null;

  function showAttract() {
    boardOverlay.classList.add('visible');
    boardWrap.classList.add('attract');
    // Gently burst the title while attract screen is showing
    clearInterval(_attractBurstTimer);
    setTimeout(titleBurst, 700);
    _attractBurstTimer = setInterval(titleBurst, 4600);
  }

  function track(event, data) {
    if (typeof umami !== 'undefined') umami.track(event, data);
  }

  function initGame() {
    clearInterval(_attractBurstTimer);
    board       = Array(9).fill(null);
    current     = 'X';
    gameOver    = false;
    cpuThinking = false;
    cells.forEach(c => {
      c.innerHTML = '';
      c.classList.remove('taken', 'winner');
    });
    boardOverlay.classList.remove('visible');
    boardWrap.classList.remove('attract');
    setStatus('Your turn', '');
  }

  function svgX() {
    return `<svg viewBox="0 0 68 68" class="mark-x">
      <line x1="12" y1="12" x2="56" y2="56"/>
      <line x1="56" y1="12" x2="12" y2="56"/>
    </svg>`;
  }

  function svgO() {
    return `<svg viewBox="0 0 68 68" class="mark-o">
      <circle cx="34" cy="34" r="20"/>
    </svg>`;
  }

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + (cls || '');
  }

  function checkWin(b, player) {
    for (const combo of WINS) {
      if (combo.every(i => b[i] === player)) return combo;
    }
    return null;
  }

  function checkDraw(b) { return b.every(v => v !== null); }

  function placeMarker(idx, player) {
    board[idx] = player;
    const cell = cells[idx];
    cell.innerHTML = player === 'X' ? svgX() : svgO();
    cell.classList.add('taken');
  }

  // ── WIN CELEBRATION — over the top flowers, petals, leaves & sparkles ───
  function celebrate() {
    const old = document.getElementById('celebrate-canvas');
    if (old) old.remove();
    const cv = document.createElement('canvas');
    cv.id = 'celebrate-canvas';
    cv.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:998;';
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    document.body.appendChild(cv);
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    const CX = W / 2, CY = H * 0.45;

    const PETALS  = ['#f9a8d4','#ff6eb4','#ffffff','#fde047','#c084fc','#fdba74','#86efac','#f472b6','#bfdbfe','#fca5a5','#fb923c','#a78bfa'];
    const CENTERS = ['#fbbf24','#ff8c00','#fff','#f9a8d4','#fde047','#22c55e'];
    const GREENS  = ['#4ade80','#86efac','#6ee7b7','#a3e635','#bbf7d0','#34d399'];

    const pieces = [];

    // ── burst piece (explodes from center) ──────────────────────────────
    function makeBurst(angle, speedMult) {
      const type = Math.random() < 0.5 ? 'flower' : Math.random() < 0.55 ? 'leaf' : 'petal';
      const spd  = (14 + Math.random() * 22) * speedMult;
      return {
        x: CX + (Math.random()-0.5)*60, y: CY + (Math.random()-0.5)*60,
        vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 6,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random()-0.5) * 0.28,
        sz: type==='flower' ? 22+Math.random()*22 : 14+Math.random()*18,
        col: type==='leaf' ? GREENS[~~(Math.random()*GREENS.length)] : PETALS[~~(Math.random()*PETALS.length)],
        ctr: CENTERS[~~(Math.random()*CENTERS.length)],
        np: 5+~~(Math.random()*3), wobP: Math.random()*Math.PI*2, wobS: 0.04+Math.random()*0.04,
        type, mode:'burst', alpha:1, gravity: 0.45+Math.random()*0.2,
      };
    }

    // ── rain piece (falls from top) ──────────────────────────────────────
    function makeRain() {
      const type = Math.random() < 0.55 ? 'flower' : Math.random() < 0.55 ? 'petal' : 'leaf';
      return {
        x: Math.random() * W, y: -40 - Math.random()*200,
        vx: (Math.random()-0.5)*3, vy: 2.5+Math.random()*4,
        rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.12,
        sz: type==='flower' ? 20+Math.random()*26 : 12+Math.random()*18,
        col: type==='leaf' ? GREENS[~~(Math.random()*GREENS.length)] : PETALS[~~(Math.random()*PETALS.length)],
        ctr: CENTERS[~~(Math.random()*CENTERS.length)],
        np: 5+~~(Math.random()*3), wobP: Math.random()*Math.PI*2, wobS: 0.022+Math.random()*0.022,
        type, mode:'rain', alpha:1, gravity:0,
      };
    }

    // ── sparkle ──────────────────────────────────────────────────────────
    function makeSparkle(x, y) {
      const angle = Math.random()*Math.PI*2, spd = 3+Math.random()*8;
      return {
        x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd - 4,
        sz: 4+Math.random()*8, alpha:1, type:'sparkle',
        col: PETALS[~~(Math.random()*PETALS.length)],
        rotV:0, rot:0, gravity:0.18, mode:'burst', wobP:0, wobS:0,
      };
    }

    // Initial MEGA burst — 3 waves
    for (let i = 0; i < 90; i++)  pieces.push(makeBurst((i/90)*Math.PI*2, 1.0));
    for (let i = 0; i < 50; i++)  pieces.push(makeBurst((i/50)*Math.PI*2 + 0.2, 0.65));
    for (let i = 0; i < 40; i++)  pieces.push(makeSparkle(CX+(Math.random()-0.5)*80, CY+(Math.random()-0.5)*80));

    let t = 0, raf;

    function drawFlower(p) {
      const r = p.sz/2;
      ctx.fillStyle = p.col;
      for (let j=0;j<p.np;j++){
        const a=(j/p.np)*Math.PI*2;
        ctx.beginPath();
        ctx.ellipse(Math.cos(a)*r*0.58,Math.sin(a)*r*0.58,r*0.40,r*0.24,a,0,Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = p.ctr;
      ctx.beginPath(); ctx.arc(0,0,r*0.30,0,Math.PI*2); ctx.fill();
      // white shine dot
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.beginPath(); ctx.arc(r*0.10, -r*0.10, r*0.10, 0, Math.PI*2); ctx.fill();
    }

    function drawLeaf(p) {
      const r=p.sz/2;
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.ellipse(0,0,r*0.40,r*0.78,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(0,-r*0.75); ctx.lineTo(0,r*0.75); ctx.stroke();
      // side veins
      ctx.lineWidth=0.7; ctx.globalAlpha*=0.6;
      for(const s of[-1,1]){ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(s*r*0.38,r*0.25);ctx.stroke();}
    }

    function drawPetal(p) {
      const r=p.sz/2;
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.ellipse(0,0,r*0.42,r*0.88,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.ellipse(-r*0.08,-r*0.2,r*0.15,r*0.4,-.3,0,Math.PI*2); ctx.fill();
    }

    function drawSparkle(p) {
      const r=p.sz/2;
      ctx.fillStyle=p.col;
      // 4-pointed star
      ctx.beginPath();
      for(let i=0;i<8;i++){
        const a=i*Math.PI/4, rr=i%2===0?r:r*0.35;
        i===0?ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
      }
      ctx.closePath(); ctx.fill();
    }

    function tick() {
      ctx.clearRect(0,0,W,H);

      // Continuous rain from top for 5 seconds
      if (t < 300 && Math.random() < 0.55) pieces.push(makeRain());
      // Extra sparkle bursts at t=30, t=60
      if (t===30||t===60) for(let i=0;i<20;i++) pieces.push(makeSparkle(CX+(Math.random()-0.5)*W*0.6, Math.random()*H*0.5));

      let alive = false;
      for (let i=pieces.length-1;i>=0;i--) {
        const p = pieces[i];
        p.wobP += p.wobS;
        if (p.mode==='burst') {
          p.vy += p.gravity;
          p.vx *= 0.97;
          p.alpha = Math.max(0, p.alpha - 0.006);
        } else {
          p.vx = Math.sin(p.wobP)*2.5;
        }
        p.x += p.vx; p.y += p.vy; p.rot += p.rotV;

        let alpha = p.alpha;
        if (p.mode==='rain') {
          alpha = Math.min(p.y/50,1) * Math.min((H-p.y)/80,1);
        }
        if (alpha <= 0 || p.y > H+50) { pieces.splice(i,1); continue; }

        alive = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        if      (p.type==='flower')  drawFlower(p);
        else if (p.type==='leaf')    drawLeaf(p);
        else if (p.type==='petal')   drawPetal(p);
        else                         drawSparkle(p);
        ctx.restore();
      }

      t++;
      if (t < 300 || alive) raf = requestAnimationFrame(tick);
      else cv.remove();
    }
    raf = requestAnimationFrame(tick);
    setTimeout(() => { cancelAnimationFrame(raf); cv.remove(); }, 10000);
  }
  // ────────────────────────────────────────────────────────────────────────

  // ── Title win burst ─────────────────────────────────────────────────────
  function titleBurst() {
    const tw = document.querySelector('.title-wrap');
    tw.classList.remove('bursting');
    void tw.offsetWidth;                    // force reflow so re-triggering works
    tw.classList.add('bursting');
    setTimeout(() => tw.classList.remove('bursting'), 1200);
  }

  // ── Sun win-burst ────────────────────────────────────────────────────────
  function sunWinPulse() {
    for (let i = 0; i < 5; i++) {
      const ring = document.createElement('div');
      ring.className = 'sun-ring';
      ring.style.animationDelay = (i * 0.26) + 's';
      // vary ring color warm→cool
      const cols = ['rgba(255,240,30,0.88)','rgba(255,200,30,0.80)','rgba(255,160,20,0.70)','rgba(255,220,60,0.65)','rgba(255,255,120,0.55)'];
      ring.style.borderColor = cols[i];
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 2400 + i * 260);
    }
  }

function endGame(winner, combo) {
  gameOver = true;
  setTimeout(() => showAttract(), 1300);
  if (winner) {
    combo.forEach(i => cells[i].classList.add('winner'));
    if (winner === 'X') {
      scores.X++;
      scoreX.textContent = scores.X;
      track('player_win', { round: scores.X + scores.O + scores.D });
      setStatus('You win! ð', 'win-x');
      sfxWin();
      sunWinPulse();
      titleBurst();
      setTimeout(celebrate, 200);
    } else {
      scores.O++;
      scoreO.textContent = scores.O;
      track('cpu_win', { round: scores.X + scores.O + scores.D });
      setStatus('CPU wins!', 'win-o');
      sfxLose();
      triggerSadReaction();
    }
  } else {
    scores.D++;
    scoreD.textContent = scores.D;
    track('draw', { round: scores.X + scores.O + scores.D });
    setStatus("It's a draw!", 'draw');
    triggerSadReaction();
  }
}

  function findWinningMove(b, player) {
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = player;
        if (checkWin(b, player)) { b[i] = null; return i; }
        b[i] = null;
      }
    }
    return -1;
  }

  function randomEmpty(b) {
    const empty = b.map((v, i) => v ? null : i).filter(i => i !== null);
    return empty[Math.floor(Math.random() * empty.length)] ?? -1;
  }

  function bestMove() {
    // 1. Always take a winning move
    const win = findWinningMove(board, 'O');
    if (win !== -1) return win;

    // 2. Block player's win — 75% of the time
    if (Math.random() < 0.75) {
      const block = findWinningMove(board, 'X');
      if (block !== -1) return block;
    }

    // 3. Take center — 65% of the time
    if (!board[4] && Math.random() < 0.65) return 4;

    // 4. Prefer corners — 50% of the time
    if (Math.random() < 0.50) {
      const corners = [0, 2, 6, 8].filter(i => !board[i]);
      if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
    }

    // 5. Random fallback
    return randomEmpty(board);
  }

  function cpuTurn() {
    cpuThinking = true;
    setStatus('CPU thinking…', '');
    setTimeout(() => {
      if (gameOver) { cpuThinking = false; return; }
      const idx = bestMove();
      placeMarker(idx, 'O');
      sfxCpuMove();
      cpuThinking = false;
      const combo = checkWin(board, 'O');
      if (combo) { endGame('O', combo); return; }
      if (checkDraw(board)) { endGame(null, null); return; }
      current = 'X';
      setStatus('Your turn', '');
    }, 380);
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const idx = +cell.dataset.i;
      if (gameOver || boardOverlay.classList.contains('visible') || board[idx] || current !== 'X' || cpuThinking) return;
      _unlockAudio();
      placeMarker(idx, 'X');
      sfxPlayerMove();
      const combo = checkWin(board, 'X');
      if (combo) { endGame('X', combo); return; }
      if (checkDraw(board)) { endGame(null, null); return; }
      current = 'O';
      cpuTurn();
    });
  });

  boardOverlay.addEventListener('click', () => { _unlockAudio(); initGame(); track('game_start'); });
  initGame();
  showAttract();

  // ── Audio engine ─────────────────────────────────────────────────────────
  //    We build the graph at page-load so it's ready immediately.
  //    Browsers that allow autoplay (file:// with prior engagement, some
  //    permissive configs) will start the music right away via onstatechange.
  //    All others start it on the very first user gesture — the earliest
  //    moment the Web Audio API permits sound.
  // ──────────────────────────────────────────────────────────────────────────
  let _rev, _mMaster, _mWet, _mDry, _sMaster, _sWet, _sDry;
  let _audioReady = false;

  const AC = new (window.AudioContext || window.webkitAudioContext)();

  // Reverb impulse response
  _rev = AC.createConvolver();
  (function () {
    const sr = AC.sampleRate, len = sr * 3.5;
    const b  = AC.createBuffer(2, len, sr);
    for (let c = 0; c < 2; c++) {
      const d = b.getChannelData(c);
      for (let i = 0; i < len; i++)
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.4);
    }
    _rev.buffer = b;
  })();

  // Music master chain
  _mMaster = AC.createGain(); _mMaster.gain.value = 0; _mMaster.connect(AC.destination);
  _mWet    = AC.createGain(); _mWet.gain.value = 0.5;  _rev.connect(_mWet); _mWet.connect(_mMaster);
  _mDry    = AC.createGain(); _mDry.gain.value = 0.5;  _mDry.connect(_mMaster);

  // SFX master chain
  _sMaster = AC.createGain(); _sMaster.gain.value = 1;    _sMaster.connect(AC.destination);
  _sWet    = AC.createGain(); _sWet.gain.value   = 0.25;  _rev.connect(_sWet); _sWet.connect(_sMaster);
  _sDry    = AC.createGain(); _sDry.gain.value   = 0.75;  _sDry.connect(_sMaster);

  function _startMusic() {
    if (_audioReady) return;
    _audioReady = true;
    _mMaster.gain.setValueAtTime(0, AC.currentTime);
    _mMaster.gain.linearRampToValueAtTime(0.22, AC.currentTime + 0.8);
    _chordIdx = 0;
    _musicLoop();
  }

  // Fire as soon as the context is actually running — covers both the
  // autoplay-allowed case and the post-gesture-resume case.
  AC.onstatechange = () => { if (AC.state === 'running') _startMusic(); };

  // Try immediately (works when browser permits autoplay)
  AC.resume().catch(() => {});

  // Fallback: resume inside the first user gesture (guaranteed to work)
  function _unlockAudio() { AC.resume().catch(() => {}); }
  document.addEventListener('pointerdown', _unlockAudio, { once: true });

  // ── SFX helpers ──────────────────────────────────────────────────────────
  function _tone(freq, type, when, dur, vol, dest) {
    if (!_audioReady) return;
    const osc = AC.createOscillator(), env = AC.createGain();
    osc.type = type; osc.frequency.value = freq;
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(vol, when + 0.012);
    env.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    osc.connect(env); env.connect(dest);
    osc.start(when); osc.stop(when + dur + 0.05);
  }

  function sfxPlayerMove() {
    const t = AC.currentTime;
    _tone(680, 'sine',     t,        0.12, 0.18, _sDry);
    _tone(920, 'sine',     t + 0.03, 0.09, 0.10, _sDry);
  }

  function sfxCpuMove() {
    const t = AC.currentTime;
    _tone(340, 'triangle', t,        0.15, 0.12, _sDry);
    _tone(260, 'triangle', t + 0.04, 0.12, 0.07, _sDry);
  }

  function sfxWin() {
    // Bright ascending fanfare — C E G C (major arpeggio)
    const t = AC.currentTime;
    [[523.25,0],[659.25,0.13],[783.99,0.26],[1046.5,0.40]].forEach(([f,d]) => {
      _tone(f, 'triangle', t + d, 0.55, 0.18, _sDry);
      _tone(f, 'triangle', t + d, 0.55, 0.10, _sWet);
    });
    // Final sparkle shimmer
    _tone(1318.5, 'sine', t + 0.72, 0.4, 0.09, _sDry);
  }

  function sfxLose() {
// Sad reaction animation â gentle, warm, never mean
  function triggerSadReaction() {
    const sunEl      = document.querySelector('.sun');
    const cloud1     = document.querySelector('.cloud-1');
    const cloud2     = document.querySelector('.cloud-2');
    const cloud3     = document.querySelector('.cloud-3');
    const sceneryEl  = document.querySelector('.scenery');
    const raysEl     = document.querySelector('.rays');
    const titleWrap  = document.querySelector('.title-wrap');

    // Dim the sun
    if (sunEl) {
      sunEl.classList.add('sad');
      setTimeout(() => sunEl.classList.remove('sad'), 3400);
    }

    // Clouds drift inward to form a mild frown gathering
    if (cloud1) {
      cloud1.classList.add('sad-drift-left');
      setTimeout(() => cloud1.classList.remove('sad-drift-left'), 3200);
    }
    if (cloud2) {
      cloud2.classList.add('sad-drift-right');

  const _BAR = _B * 4;                // one bar  = ~3.24 s

    { b:130.81, a:[261.63,329.63,392.00,523.25], m:[659.25,783.99,523.25,659.25,880.00,659.25] }, // C
    { b:196.00, a:[392.00,493.88,587.33,783.99], m:[587.33,783.99,493.88,659.25,783.99,493.88] }, // G

  // Harp-like pluck: quick attack, natural bell decay
  function _pluck(freq, when, dur, vol, dest) {
    // Two oscillators: fundamental + soft octave overtone
    [1, 2].forEach((mult, i) => {
      const osc = AC.createOscillator(), env = AC.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq * mult;
      const v = i === 0 ? vol : vol * 0.18;
      env.gain.setValueAtTime(0, when);
      env.gain.linearRampToValueAtTime(v, when + 0.008);   // snappy attack
      env.gain.exponentialRampToValueAtTime(v * 0.3, when + dur * 0.25); // decay
      env.gain.exponentialRampToValueAtTime(0.0001, when + dur);
      osc.connect(env); env.connect(dest);
      osc.start(when); osc.stop(when + dur + 0.1);
    });
  }

  // Soft pad note: slow attack, warm sustain
  function _pad(freq, when, dur, vol, dest) {
    const osc = AC.createOscillator(), env = AC.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(vol, when + 0.8);
    env.gain.setValueAtTime(vol * 0.7, when + dur - 1.0);
    env.gain.linearRampToValueAtTime(0, when + dur);
    osc.connect(env); env.connect(dest);
    osc.start(when); osc.stop(when + dur + 0.1);
  }

  // Schedule one full chord block (2 bars)
  function _scheduleChord(chord, startTime) {
    const { b, a, m } = chord;
    const bars = 2, beats = bars * 4;
    const arpStep = _B * 0.5;   // arpeggiate every half-beat (8th notes)
    const arpPat  = [0,1,2,3,2,1,0,2, 1,3,2,1,0,2,1,3]; // up-down pattern

    // Bass pad — warm, sustained
    _pad(b,       startTime, _BAR * bars, 0.055, _mDry);
    _pad(b * 2,   startTime, _BAR * bars, 0.028, _mDry);
    _pad(b,       startTime, _BAR * bars, 0.030, _rev);

    // Arpeggios — harp plucks every 8th note
    for (let i = 0; i < beats * 2; i++) {
      const t    = startTime + i * arpStep;
      const note = a[arpPat[i % arpPat.length]];
      const vol  = i % 8 === 0 ? 0.11 : 0.07; // accent downbeats
      _pluck(note, t, _B * 1.4, vol, _mDry);
      _pluck(note, t, _B * 2.0, vol * 0.4, _rev);
    }

    // Melody — one note every 1â€“2 beats, from chord's melody pool
    let mt = startTime + _B * 0.5;
    while (mt < startTime + _BAR * bars - _B) {
      const f   = m[Math.floor(Math.random() * m.length)];
      const dur = _B * (Math.random() > 0.5 ? 2 : 1.5);
      _pluck(f, mt, dur + 0.6, 0.09, _mDry);
      _pluck(f, mt, dur + 1.2, 0.06, _rev);
      mt += _B * (1 + Math.floor(Math.random() * 2));
    }
  }

  // By the time this runs AC is guaranteed to be in 'running' state,
  // so AC.currentTime is real and notes schedule correctly.
  let _chordIdx = 0;
  function _musicLoop() {
    const now = AC.currentTime;
    const dur = _BAR * 2;
    _scheduleChord(_CHORDS[_chordIdx % _CHORDS.length], now);
    _chordIdx++;
    setTimeout(_musicLoop, dur * 1000 - 200);
  }

  // ── Ambient wind wisps & floating flowers ──────────────────────────────
  (function () {

    function resize() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
    resize();

    const PETALS = ['#f9a8d4','#ffffff','#fde047','#c084fc','#fdba74','#86efac','#f472b6','#bfdbfe'];

    const wisps = [], florets = [];

    function spawnWisp() {
      const left = Math.random() > 0.25;
      const len  = 90 + Math.random() * 140;
      wisps.push({
        x:     left ? -len - 20 : cv.width + len + 20,
        y:     cv.height * (0.06 + Math.random() * 0.66),
        dir:   left ? 1 : -1,
        spd:   0.55 + Math.random() * 1.1,
        len,
        // curl: how much the bezier bows up/down
        curl:  (Math.random() > 0.5 ? 1 : -1) * (22 + Math.random() * 48),
        curl2: (Math.random() > 0.5 ? 1 : -1) * (10 + Math.random() * 30),
        maxA:  0.13 + Math.random() * 0.16,
        alpha: 0,
        lw:    1.2 + Math.random() * 2.0,
        col:   Math.random() > 0.35 ? 'rgba(255,255,255,1)' : 'rgba(200,240,255,1)',
        phase: Math.random() * Math.PI * 2,
        drift: 0.006 + Math.random() * 0.008,  // slow curl drift over time
      });
    }

    function spawnFlower() {
      const left = Math.random() > 0.2;
      const col  = PETALS[Math.floor(Math.random() * PETALS.length)];
      const ctr  = PETALS[Math.floor(Math.random() * PETALS.length)];
      florets.push({
        x: left ? -24 : cv.width + 24,
        baseY: cv.height * (0.12 + Math.random() * 0.62),
        y: 0,
        dir: left ? 1 : -1,
        spd:  0.5 + Math.random() * 1.1,

        bobP: Math.random() * Math.PI * 2,
        sz:   9 + Math.random() * 13,
        maxA: 0.55 + Math.random() * 0.35,
        alpha: 0, col, ctr,
        np: 5 + Math.floor(Math.random() * 2),
        t: Math.random() * 200,
      });

    // Cubic bezier point interpolation
    function cbez(p0, p1, p2, p3, t) {
      const m = 1 - t;
      return m*m*m*p0 + 3*m*m*t*p1 + 3*m*t*t*p2 + t*t*t*p3;
    }

    function drawWisp(w, tick) {
      // Animate the curl slowly over time for a living, breathing feel
      const animCurl  = w.curl  + Math.sin(tick * w.drift + w.phase) * 18;
      const animCurl2 = w.curl2 + Math.cos(tick * w.drift + w.phase + 1.2) * 12;

      const x0 = w.x,            y0 = w.y;
      const x3 = w.x + w.dir * w.len, y3 = w.y + animCurl2 * 0.4;

      // S-curve control points
      const cp1x = x0 + w.dir * w.len * 0.28, cp1y = y0 - animCurl;
      const cp2x = x0 + w.dir * w.len * 0.72, cp2y = y3 + animCurl * 0.55;

      // Draw as tapered segments (thin→thick→thin = natural wisp)
      const N = 22;
      ctx.save();
      ctx.lineCap = 'round';
      ctx.globalAlpha = w.alpha;

      for (let i = 0; i < N; i++) {
        const t0 = i / N, t1 = (i + 1) / N, mid = (t0 + t1) * 0.5;
        // Bell taper: zero at ends, max in middle
        const taper = Math.sin(mid * Math.PI);
        ctx.lineWidth = Math.max(0.2, w.lw * taper);
        ctx.strokeStyle = w.col;

        const bx1 = cbez(x0, cp1x, cp2x, x3, t0);
        const by1 = cbez(y0, cp1y, cp2y, y3, t0);
        const bx2 = cbez(x0, cp1x, cp2x, x3, t1);
        const by2 = cbez(y0, cp1y, cp2y, y3, t1);

        ctx.beginPath();
        ctx.moveTo(bx1, by1);
        ctx.lineTo(bx2, by2);
        ctx.stroke();
      }

      // Little trailing curl at the tip
      const tipX = cbez(x0, cp1x, cp2x, x3, 0.92) ;
      const tipY = cbez(y0, cp1y, cp2y, y3, 0.92);
      ctx.lineWidth = w.lw * 0.4;
      ctx.globalAlpha = w.alpha * 0.5;
      ctx.beginPath();
      ctx.arc(tipX + w.dir * 7, tipY - animCurl * 0.08, 7, Math.PI, Math.PI * 2.8, w.dir < 0);

      ctx.save();

    function fade(progress) {
      return Math.min(progress * 4, 1) * Math.min((1 - progress) * 4, 1);
    }

    let t = 0, lastW = -999, lastF = -999;

    // Pre-seed so screen isn't empty at start
    for (let i = 0; i < 4; i++) {
      spawnWisp();
      wisps[i].x = Math.random() * cv.width;
    }
    for (let i = 0; i < 5; i++) {

    }

    function tick() {
      ctx.clearRect(0, 0, cv.width, cv.height);

      if (t - lastW > 55 + Math.random() * 75)  { spawnWisp();   lastW = t; }
      if (t - lastF > 80 + Math.random() * 110) { spawnFlower(); lastF = t; }

      for (let i = wisps.length - 1; i >= 0; i--) {
        const w = wisps[i];
        w.x += w.dir * w.spd;
        const prog = w.dir > 0 ? (w.x + w.len) / (cv.width + w.len * 2)

        w.alpha = w.maxA * fade(prog);
        drawWisp(w, t);
        if ((w.dir > 0 && w.x > cv.width + w.len) || (w.dir < 0 && w.x < -w.len * 2))

      for (let i = 0; i < n; i++) {
        const osc = AC.createOscillator(), env = AC.createGain();
        osc.type = 'sine';
        const f0 = 1600+Math.random()*600, f1 = f0+400+Math.random()*800;
        osc.frequency.setValueAtTime(f0, t+i*0.09);
        osc.frequency.exponentialRampToValueAtTime(f1, t+i*0.09+0.07);
        env.gain.setValueAtTime(0,t+i*0.09);
        env.gain.linearRampToValueAtTime(0.07,t+i*0.09+0.012);
        env.gain.exponentialRampToValueAtTime(0.0001,t+i*0.09+0.13);
        osc.connect(env); env.connect(_sMaster);
        osc.start(t+i*0.09); osc.stop(t+i*0.09+0.18);
      }
    }

    function croak() {
      if (!_audioReady) return;
      const t = AC.currentTime;
      [[380,0],[290,0.28],[420,0.50]].forEach(([freq,d]) => {
        const osc = AC.createOscillator(), env = AC.createGain();
        const filt = AC.createBiquadFilter();
        osc.type='sawtooth'; osc.frequency.value=freq;
        filt.type='bandpass'; filt.frequency.value=freq*1.5; filt.Q.value=4;
        env.gain.setValueAtTime(0,t+d);
        env.gain.linearRampToValueAtTime(0.07,t+d+0.06);
        env.gain.exponentialRampToValueAtTime(0.0001,t+d+0.32);
        osc.connect(filt); filt.connect(env); env.connect(_sMaster);
        osc.start(t+d); osc.stop(t+d+0.38);
      });
    }

    // Seed birds spread across screen
    const birds = [];
    const seedTypes = ['parakeet','parakeet','parakeet','toucan','toucan'];
    seedTypes.forEach(type => {
      const b = spawn(type);
      b.x = Math.random() * cv.width;
      b.baseY = cv.height * (0.06 + Math.random() * 0.52);
      birds.push(b);
    });

    let tick = 0, nextSpawn = 300;

    function loop() {
      ctx.clearRect(0, 0, cv.width, cv.height);

      // Spawn new birds so the sky stays lively
      if (tick > nextSpawn && birds.length < 9) {
        birds.push(spawn(Math.random() > 0.38 ? 'parakeet' : 'toucan'));
        nextSpawn = tick + 280 + Math.random() * 350;
      }

      for (let i = birds.length - 1; i >= 0; i--) {
        const b = birds[i];
        b.t++;

        if (b.state === 'flying') {
          b.flapP += b.flapS;
          b.pathP += b.pathF;
          b.x    += b.dir * b.spd;
          b.y     = b.baseY + Math.sin(b.pathP) * b.pathA;

          // Sound countdown
          b.soundIn -= 16;
          if (b.soundIn <= 0) {
            b.type === 'parakeet' ? chirp() : croak();
            b.soundIn = b.type === 'parakeet' ? 2500+Math.random()*4000 : 5000+Math.random()*7000;
          }

          // Occasionally decide to perch on the title
          b.perchDecideIn--;
          if (b.perchDecideIn <= 0) {
            b.perchDecideIn = 700 + Math.random() * 1400;
            if (perchedCount < MAX_PERCHED && Math.random() < 0.42 && titleEl) {
              const r = titleEl.getBoundingClientRect();
              // Only perch if bird is passing over the title x-range
              if (b.x > r.left - 150 && b.x < r.right + 150) {
                const pt = getPerchPoint();
                b.state  = 'gliding';
                b.perchX = pt.x;
                b.perchY = pt.y;
                b.dir    = pt.x > b.x ? 1 : -1;
                perchedCount++;
              }
            }
          }

          // Cull off-screen
          const margin = b.sz * 2;
          if ((b.dir > 0 && b.x > cv.width + margin) || (b.dir < 0 && b.x < -margin)) {
            birds.splice(i, 1); continue;
          }
          b.type === 'parakeet' ? drawParakeet(b) : drawToucan(b);

        } else if (b.state === 'gliding') {
          // Smooth glide toward perch point
          const dx   = b.perchX - b.x;
          const dy   = b.perchY - b.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const spd  = Math.max(0.5, Math.min(b.spd * 0.85, dist * 0.055));
          if (dist > 3) { b.x += (dx / dist) * spd; b.y += (dy / dist) * spd; }
          b.flapP += b.flapS * 0.30; // slow lazy glide flaps

          if (dist <= 3) {
            b.x = b.perchX; b.y = b.perchY;
            b.state = 'perched';
            b.perchTimer = 220 + Math.random() * 260; // ~3.5â€“8s at 60fps
            b.flapS = 0.012;
            chirp();
          }
          b.type === 'parakeet' ? drawParakeet(b) : drawToucan(b);

        } else if (b.state === 'perched') {
          // Gentle breathe-bob on the title
          b.flapP += b.flapS;
          b.y = b.perchY + Math.sin(b.t * 0.038) * 2.0;
          b.perchTimer--;

          // Draw tiny feet gripping the title
          const s2 = b.sz / 60;
          ctx.save();
          ctx.translate(b.x, b.y);
          if (b.dir < 0) ctx.scale(-1, 1);
          ctx.strokeStyle = '#f59e0b';
          ctx.lineWidth = s2 * 2.6;
          ctx.lineCap = 'round';
          // left leg + two toes
          ctx.beginPath(); ctx.moveTo(-s2*6, s2*12); ctx.lineTo(-s2*6, s2*20); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-s2*14, s2*21); ctx.lineTo(-s2*6,  s2*20);
          ctx.lineTo(-s2*2,  s2*21);
          ctx.stroke();
          // right leg + two toes
          ctx.beginPath(); ctx.moveTo(s2*5, s2*12); ctx.lineTo(s2*5, s2*20); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-s2*2, s2*21); ctx.lineTo(s2*5,  s2*20);
          ctx.lineTo(s2*12, s2*21);
          ctx.stroke();
          ctx.restore();

          b.type === 'parakeet' ? drawParakeet(b) : drawToucan(b);

          if (b.perchTimer <= 0) {
            perchedCount--;
            b.state  = 'launching';
            b.flapS  = b.type === 'parakeet' ? 0.33 : 0.22;
            b.dir    = Math.random() > 0.5 ? 1 : -1;
            b.launchT = 0;
            chirp();
          }

        } else if (b.state === 'launching') {
          b.launchT++;
          b.flapP += b.flapS;
          b.x    += b.dir * b.spd * 1.5;
          b.y     = Math.max(18, b.y - 2.4);
          b.baseY = b.y;
          b.type === 'parakeet' ? drawParakeet(b) : drawToucan(b);

          if (b.launchT > 52) {
            b.state  = 'flying';
            b.launchT = 0;
            b.flapS  = b.type === 'parakeet' ? 0.22+Math.random()*0.12 : 0.13+Math.random()*0.08;
            b.spd    = b.type === 'parakeet' ? 1.6+Math.random()*1.8   : 1.0+Math.random()*1.2;
            b.pathP  = Math.random() * Math.PI * 2;
          }

          const margin = b.sz * 2;
          if ((b.dir > 0 && b.x > cv.width + margin) || (b.dir < 0 && b.x < -margin)) {
            birds.splice(i, 1); continue;
          }
        }
      }

      tick++;
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  // ────────────────────────────────────────────────────────────────────────

  // ── Squirrels ─────────────────────────────────────────────────────────────
  (function () {
    const cv = document.createElement('canvas');
    cv.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:1;';
    document.body.appendChild(cv);
    const ctx = cv.getContext('2d');
    function resize() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    // Acorn spawn positions — fixed spots on the hills (relative to viewport)
    const ACORN_DEFS = [
      { rx: 0.08, ry: 0.838 },
      { rx: 0.21, ry: 0.853 },
      { rx: 0.37, ry: 0.867 },
      { rx: 0.54, ry: 0.871 },
      { rx: 0.69, ry: 0.857 },
      { rx: 0.84, ry: 0.843 },
    ];
    const acorns = ACORN_DEFS.map((def, idx) => ({
      idx,
      get x() { return def.rx * cv.width; },
      get y() { return def.ry * cv.height; },
      visible: true,
      claimed: false,
      respawnIn: 0,
    }));

    function drawAcorn(ax, ay, sz) {
      // cap
      ctx.fillStyle = '#92400e';
      ctx.beginPath(); ctx.ellipse(ax, ay - sz*0.28, sz*0.56, sz*0.36, 0, 0, Math.PI*2); ctx.fill();
      // stem
      ctx.strokeStyle = '#78350f'; ctx.lineWidth = sz*0.18; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(ax, ay - sz*0.56); ctx.lineTo(ax + sz*0.24, ay - sz*0.78); ctx.stroke();
      // nut
      ctx.fillStyle = '#b45309';
      ctx.beginPath(); ctx.ellipse(ax, ay + sz*0.12, sz*0.42, sz*0.52, 0, 0, Math.PI*2); ctx.fill();
      // shine
      ctx.fillStyle = 'rgba(255,255,200,0.28)';
      ctx.beginPath(); ctx.ellipse(ax - sz*0.12, ay - sz*0.04, sz*0.14, sz*0.22, -0.3, 0, Math.PI*2); ctx.fill();
    }

    function spawnSquirrel() {
      // Pick an unclaimed visible acorn
      const available = acorns.filter(a => a.visible && !a.claimed);
      if (available.length === 0) return null;
      const target = available[Math.floor(Math.random() * available.length)];
      target.claimed = true;

      // Enter from the closer side (with a little randomness)
      const leftBias = target.x < cv.width * 0.5;
      const enterLeft = Math.random() < (leftBias ? 0.72 : 0.28);
      return {
        x:       enterLeft ? -70 : cv.width + 70,
        baseY:   target.y,
        y:       target.y,
        dir:     enterLeft ? 1 : -1,
        sz:      30 + Math.random() * 14,
        spd:     0.80 + Math.random() * 0.85,
        t:       0,
        state:   'seek',   // seek | grab | leave
        target,
        nibbleT: 0,
      };
    }

    function drawSquirrel(sq) {
      ctx.save();
      ctx.translate(sq.x, sq.y);
      if (sq.dir < 0) ctx.scale(-1, 1);
      const s = sq.sz / 30;
      ctx.scale(s, s);

      // Fluffy tail — two-layer bushy arc
      ctx.fillStyle = '#92400e';
      ctx.beginPath();
      ctx.moveTo(-8, 0);
      ctx.bezierCurveTo(-30, -4, -40, -28, -24, -40);
      ctx.bezierCurveTo(-15, -46, -9, -37, -14, -30);
      ctx.bezierCurveTo(-26, -18, -20, -5, -4, -2);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#b45309';
      ctx.beginPath();
      ctx.moveTo(-10, -1);
      ctx.bezierCurveTo(-26, -6, -34, -26, -20, -36);
      ctx.bezierCurveTo(-14, -40, -11, -32, -15, -27);
      ctx.bezierCurveTo(-23, -16, -17, -5, -6, -2);
      ctx.closePath(); ctx.fill();

      // Body
      ctx.fillStyle = '#78350f';
      ctx.beginPath(); ctx.ellipse(0, 0, 13, 9, 0, 0, Math.PI*2); ctx.fill();
      // Belly
      ctx.fillStyle = '#d97706';
      ctx.beginPath(); ctx.ellipse(3, 2, 7, 5, 0.25, 0, Math.PI*2); ctx.fill();

      // Head
      ctx.fillStyle = '#78350f';
      ctx.beginPath(); ctx.arc(13, -7, 9, 0, Math.PI*2); ctx.fill();

      // Ears
      ctx.fillStyle = '#78350f';
      ctx.beginPath(); ctx.moveTo(9,-15); ctx.lineTo(12,-23); ctx.lineTo(16,-15); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath(); ctx.moveTo(10,-15); ctx.lineTo(12,-20); ctx.lineTo(15,-15); ctx.closePath(); ctx.fill();

      // Snout
      ctx.fillStyle = '#c2855a';
      ctx.beginPath(); ctx.ellipse(21, -4, 5, 3.5, 0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1c1917';
      ctx.beginPath(); ctx.arc(24.5, -5, 1.6, 0, Math.PI*2); ctx.fill();

      // Eye
      ctx.fillStyle = '#1c1917';
      ctx.beginPath(); ctx.arc(17, -10, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(17.8, -11, 0.9, 0, Math.PI*2); ctx.fill();

      // Tiny acorn held when grabbing
      if (sq.state === 'grab') {
        ctx.fillStyle = '#92400e';
        ctx.beginPath(); ctx.ellipse(27, -7, 4, 2.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#b45309';
        ctx.beginPath(); ctx.ellipse(27, -3.5, 3.2, 3.8, 0, 0, Math.PI*2); ctx.fill();
      }

      // Legs (animated when moving)
      const moving = sq.state === 'seek' || sq.state === 'leave';
      const swing  = moving ? Math.sin(sq.t * 0.38) * 7 : 0;
      ctx.strokeStyle = '#78350f'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(8,  6); ctx.lineTo(10 + swing,  16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(5,  7); ctx.lineTo(3  - swing,  16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-5, 6); ctx.lineTo(-2 + swing,  16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-9, 6); ctx.lineTo(-11 - swing, 16); ctx.stroke();

      ctx.restore();
    }

    const squirrels = [];
    let tick = 0, nextSpawn = 200;

    function loop() {
      ctx.clearRect(0, 0, cv.width, cv.height);

      // Draw acorns (and tick respawn timers)
      for (const a of acorns) {
        if (a.visible) {
          drawAcorn(a.x, a.y, 11);
        } else if (!a.claimed) {
          a.respawnIn--;
          if (a.respawnIn <= 0) a.visible = true;
        }
      }

      // Spawn a new squirrel if there's an unclaimed acorn and room
      if (tick > nextSpawn && squirrels.length < 3) {
        const sq = spawnSquirrel();
        if (sq) squirrels.push(sq);
        nextSpawn = tick + 360 + Math.random() * 480;
      }

      for (let i = squirrels.length - 1; i >= 0; i--) {
        const sq = squirrels[i];
        sq.t++;

        if (sq.state === 'seek') {
          // Run toward acorn
          const dx = sq.target.x - sq.x;
          sq.dir = dx > 0 ? 1 : -1;
          if (Math.abs(dx) > 6) {
            sq.x += sq.dir * sq.spd;
          } else {
            // Arrived — start nibbling
            sq.x = sq.target.x;
            sq.state  = 'grab';
            sq.nibbleT = 130 + Math.random() * 70; // ~2â€“3.3s
          }
          sq.y = sq.baseY;

        } else if (sq.state === 'grab') {
          sq.nibbleT--;
          // Gentle head-bob nibble
          sq.y = sq.baseY + Math.sin(sq.t * 0.24) * 3.2;

          if (sq.nibbleT <= 0) {
            // Acorn collected — mark it for respawn
            sq.target.visible  = false;
            sq.target.claimed  = false;
            sq.target.respawnIn = 540 + Math.random() * 540; // ~9â€“18s
            sq.state    = 'leave';
            sq.dir      = Math.random() > 0.5 ? 1 : -1;
          }

        } else if (sq.state === 'leave') {
          sq.x += sq.dir * sq.spd * 1.15;
          sq.y  = sq.baseY;
          if ((sq.dir > 0 && sq.x > cv.width + 90) || (sq.dir < 0 && sq.x < -90)) {
            squirrels.splice(i, 1); continue;
          }
        }

        drawSquirrel(sq);
      }

      tick++;
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  // ────────────────────────────────────────────────────────────────────────
</script>
<div id="proto-badge" style="position:fixed;top:12px;right:12px;z-index:9999;background:rgba(255,180,0,0.88);color:#111;font-family:monospace;font-size:11px;font-weight:bold;padding:5px 12px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,0.35);pointer-events:none;letter-spacing:1px;user-select:none;">PROTOTYPE &middot; P2026-W16</div>
</body>

  <style>
    :root {
      color-scheme: dark;
      --ink: #fff7d7;
      --muted: #d8dfef;
      --gold: #ffd878;
      --blue: #182f54;
      --night: #071326;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: radial-gradient(circle at 50% 0%, #315680 0%, var(--night) 62%, #040915 100%);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(960px, 100%);
    }

    img {
      display: block;
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    h1 {
      margin: 22px 0 10px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      max-width: 720px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 12px 22px;
      border-radius: 8px;
      background: var(--gold);
      color: #271907;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(255, 216, 120, 0.28);
    }

    a:focus-visible {
      outline: 3px solid #fff7d7;
      outline-offset: 4px;
    }
